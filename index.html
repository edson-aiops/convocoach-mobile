<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ConvoCoach">
  <title>ConvoCoach</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <div id="setup-screen" class="screen"></div>
    <div id="home-screen" class="screen" hidden></div>
    <div id="chat-screen" class="screen" hidden></div>
    <div id="report-screen" class="screen" hidden></div>
    <div id="history-screen" class="screen" hidden></div>
    <div id="daily-screen" class="screen" hidden></div>
    <div id="toast-container"></div>
  </div>
  <script type="module" src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
